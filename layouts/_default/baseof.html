<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="section-{{ .Section }}">
  {{ if eq .Section "posts" }}
  <div class="reading-progress" id="readingProgress"></div>
  {{ end }}
  {{ partial "header.html" . }}
  <main class="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ $js := resources.Get "js/main.js" | minify | fingerprint }}
  <script src="{{ $js.RelPermalink }}"></script>
</body>
</html>
